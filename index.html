<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Multi-Lang Photobooth (No API Key)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&family=Bebas+Neue&family=Noto+Sans:wght@400;700&family=Caveat:wght@400;700&display=swap');
        
        body {
            font-family: 'Pretendard', 'Noto Sans', sans-serif;
            background-color: #f3f4f6;
        }
        
        .print-area {
            display: flex;
            justify-content: center;
            gap: 10px;
            background-color: #ffffff;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 2px;
            width: 600px; 
            height: 900px;
            margin: 0 auto;
        }

        .photo-strip {
            flex: 1;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            padding: 5px;
        }

        .photo-frame {
            width: 100%;
            height: 20%; 
            background-color: #f3f4f6;
            margin-bottom: 8px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .fixed-label {
            position: absolute;
            top: 5px;
            left: 5px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 1px 6px;
            font-family: 'Bebas Neue', cursive;
            font-size: 0.7rem;
            letter-spacing: 1px;
            border-radius: 1px;
            z-index: 10;
        }

        .caption-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            padding: 8px 4px 4px 4px;
            text-align: center;
            color: white;
            z-index: 10;
        }

        .caption-main { font-size: 0.85rem; font-weight: bold; margin-bottom: 2px; line-height: 1.1; }
        .caption-sub { font-size: 0.75rem; opacity: 0.9; line-height: 1.1; }

        .post-card-footer {
            margin-top: auto;
            padding: 10px 5px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .handwriting-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-family: 'Caveat', cursive;
            color: #4b5563;
        }

        .label-text {
            font-size: 0.9rem;
            font-weight: 700;
            min-width: 35px;
        }

        .input-line {
            flex: 1;
            border-bottom: 1px solid #d1d5db;
            font-size: 1.1rem;
            padding-bottom: 2px;
            min-height: 1.2rem;
            overflow: hidden;
            white-space: nowrap;
        }

        .countdown-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 50;
        }

        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media print {
            body * { visibility: hidden; }
            #capture-area, #capture-area * { visibility: visible; }
            #capture-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: auto;
                box-shadow: none;
                margin: 0;
                padding: 0;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <h1 class="text-3xl font-bold mb-2 text-gray-800">📸 Global Photobooth</h1>
    <p class="text-gray-500 mb-8 text-sm text-center">API Key 없이 바로 즐기는 한국어 & 베트남어 자동 번역 4컷</p>

    <div class="max-w-7xl w-full grid grid-cols-1 xl:grid-cols-12 gap-10">
        <div class="xl:col-span-5 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <div class="space-y-4 mb-6">
                    <div class="grid grid-cols-1 gap-3">
                        <div class="flex items-center gap-2">
                            <span class="w-16 font-bold text-gray-400 text-xs">TO</span>
                            <input type="text" id="to-input" oninput="updateFooter()" class="flex-1 border p-2 rounded text-sm" placeholder="받는 사람">
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="w-16 font-bold text-gray-400 text-xs">FROM</span>
                            <input type="text" id="from-input" oninput="updateFooter()" class="flex-1 border p-2 rounded text-sm" placeholder="보내는 사람">
                        </div>
                        <hr class="my-2">
                        <div class="flex items-center gap-2">
                            <span class="w-16 font-bold text-blue-500 text-xs">WHO</span>
                            <input type="text" id="msg-0" class="flex-1 border p-2 rounded text-sm" value="My best friend">
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="w-16 font-bold text-blue-500 text-xs">WHY</span>
                            <input type="text" id="msg-1" class="flex-1 border p-2 rounded text-sm" value="Traveling together">
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="w-16 font-bold text-blue-500 text-xs">WHAT</span>
                            <input type="text" id="msg-2" class="flex-1 border p-2 rounded text-sm" value="Cheese!">
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="w-16 font-bold text-blue-500 text-xs">NOW</span>
                            <input type="text" id="msg-3" class="flex-1 border p-2 rounded text-sm" value="Happy moment">
                        </div>
                    </div>
                </div>

                <div class="relative rounded-lg overflow-hidden bg-black aspect-video mb-4 border-4 border-gray-800">
                    <video id="webcam" autoplay playsinline class="w-full h-full object-cover transform -scale-x-100"></video>
                    <div id="countdown" class="countdown-overlay hidden">3</div>
                    <div id="translating-overlay" class="absolute inset-0 bg-black/60 flex flex-col items-center justify-center text-white hidden">
                        <div class="loading-spinner mb-4"></div>
                        <p class="px-6 text-center">실시간 번역 처리 중...</p>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <button id="start-btn" onclick="handleStart()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">
                        번역 후 촬영 시작
                    </button>
                    <div class="flex gap-2">
                        <button onclick="downloadStrip()" class="flex-1 bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-700 transition">이미지 저장</button>
                        <button onclick="printStrip()" class="flex-1 bg-gray-800 text-white font-bold py-3 rounded-xl hover:bg-black transition">인쇄하기</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="xl:col-span-7 flex justify-center items-start overflow-auto bg-gray-300 p-8 rounded-xl">
            <div id="capture-area" class="print-area">
                <div id="strip-left" class="photo-strip"></div>
                <div id="strip-right" class="photo-strip border-l border-dashed border-gray-300 ml-2 pl-4"></div>
            </div>
        </div>
    </div>

    <audio id="shutter-sound" src="https://assets.mixkit.co/active_storage/sfx/702/702-preview.mp3"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        const video = document.getElementById('webcam');
        const countdownEl = document.getElementById('countdown');
        const startBtn = document.getElementById('start-btn');
        const translatingOverlay = document.getElementById('translating-overlay');
        const shutterSound = document.getElementById('shutter-sound');
        const stripLeft = document.getElementById('strip-left');
        const stripRight = document.getElementById('strip-right');

        function initStrips() {
            const labels = ['WHO', 'WHY', 'WHAT', 'NOW'];
            
            stripLeft.innerHTML = '';
            labels.forEach((label, i) => {
                stripLeft.innerHTML += `
                    <div class="photo-frame">
                        <div class="fixed-label">${label}</div>
                        <canvas id="canvas-L-${i}" class="photo-canvas"></canvas>
                        <div class="caption-container">
                            <div class="view-en-L-${i} caption-main">...</div>
                            <div class="view-vi-L-${i} caption-sub text-blue-200">...</div>
                        </div>
                    </div>
                `;
            });
            addFooter(stripLeft, 'L', 'VIETNAMESE VERSION');

            stripRight.innerHTML = '';
            labels.forEach((label, i) => {
                stripRight.innerHTML += `
                    <div class="photo-frame">
                        <div class="fixed-label">${label}</div>
                        <canvas id="canvas-R-${i}" class="photo-canvas"></canvas>
                        <div class="caption-container">
                            <div class="view-en-R-${i} caption-main">...</div>
                            <div class="view-ko-R-${i} caption-sub text-emerald-200">...</div>
                        </div>
                    </div>
                `;
            });
            addFooter(stripRight, 'R', 'KOREAN VERSION');
        }

        function addFooter(container, side, verText) {
            container.innerHTML += `
                <div class="post-card-footer">
                    <div class="handwriting-row"><span class="label-text">To.</span><span id="footer-to-${side}" class="input-line"></span></div>
                    <div class="handwriting-row"><span class="label-text">From.</span><span id="footer-from-${side}" class="input-line"></span></div>
                    <div class="text-center mt-2"><p class="font-bold text-gray-300 text-[7px] uppercase">${verText}</p></div>
                </div>
            `;
        }

        function updateFooter() {
            const toVal = document.getElementById('to-input').value;
            const fromVal = document.getElementById('from-input').value;
            ['L', 'R'].forEach(side => {
                const toEl = document.getElementById(`footer-to-${side}`);
                const fromEl = document.getElementById(`footer-from-${side}`);
                if (toEl) toEl.textContent = toVal;
                if (fromEl) fromEl.textContent = fromVal;
            });
        }

        /**
         * API Key 없이 번역하기 위해 무료 MyMemory API를 사용합니다.
         */
        async function translateText(text, targetLang) {
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|${targetLang}`);
                const data = await res.json();
                return data.responseData.translatedText;
            } catch (e) {
                console.error("Translation error:", e);
                return text; // 실패 시 원문 반환
            }
        }

        async function handleStart() {
            const inputs = [
                document.getElementById('msg-0').value,
                document.getElementById('msg-1').value,
                document.getElementById('msg-2').value,
                document.getElementById('msg-3').value
            ];

            // 번역 오버레이 표시
            translatingOverlay.classList.remove('hidden');

            try {
                // 병렬로 번역 실행 (한국어, 베트남어)
                const translationPromises = inputs.map(async (text, i) => {
                    const ko = await translateText(text, 'ko');
                    const vi = await translateText(text, 'vi');
                    return { index: i, en: text, ko, vi };
                });

                const results = await Promise.all(translationPromises);

                results.forEach(res => {
                    document.querySelectorAll(`.view-en-L-${res.index}, .view-en-R-${res.index}`).forEach(el => el.textContent = res.en);
                    document.querySelectorAll(`.view-vi-L-${res.index}`).forEach(el => el.textContent = res.vi);
                    document.querySelectorAll(`.view-ko-R-${res.index}`).forEach(el => el.textContent = res.ko);
                });
            } catch (e) {
                console.error("번역 프로세스 오류", e);
                inputs.forEach((text, i) => {
                    document.querySelectorAll(`.view-en-L-${i}, .view-en-R-${i}`).forEach(el => el.textContent = text);
                });
            } finally {
                translatingOverlay.classList.add('hidden');
            }

            startSequence();
        }

        async function startSequence() {
            startBtn.disabled = true;
            for (let i = 0; i < 4; i++) {
                for (let count = 3; count > 0; count--) {
                    countdownEl.textContent = count;
                    countdownEl.classList.remove('hidden');
                    await new Promise(r => setTimeout(r, 800));
                }
                countdownEl.classList.add('hidden');
                takePhoto(i);
                if(shutterSound.paused) shutterSound.play().catch(e => {}); 
                else { shutterSound.currentTime = 0; shutterSound.play().catch(e => {}); }
                await new Promise(r => setTimeout(r, 600));
            }
            startBtn.disabled = false;
        }

        function takePhoto(index) {
            ['L', 'R'].forEach(side => {
                const canvas = document.getElementById(`canvas-${side}-${index}`);
                const ctx = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            });
        }

        async function downloadStrip() {
            const captureArea = document.getElementById('capture-area');
            const canvas = await html2canvas(captureArea, { scale: 2 });
            const link = document.createElement('a');
            link.download = `photobooth-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        async function printStrip() {
            const captureArea = document.getElementById('capture-area');
            const canvas = await html2canvas(captureArea, { scale: 2 });
            const dataUrl = canvas.toDataURL();
            
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                    <head>
                        <title>Print Photobooth</title>
                        <style>
                            body { margin: 0; display: flex; justify-content: center; align-items: center; background: white; }
                            img { max-width: 100%; height: auto; }
                            @page { size: auto; margin: 0; }
                        </style>
                    </head>
                    <body onload="window.print(); window.close();">
                        <img src="${dataUrl}" />
                    </body>
                </html>
            `);
            printWindow.document.close();
        }

        navigator.mediaDevices.getUserMedia({ video: true }).then(s => video.srcObject = s).catch(e => console.error("Camera access denied"));
        initStrips();
    </script>
</body>
</html>
