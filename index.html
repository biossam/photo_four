<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English 4-Cut Photobooth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&family=Bebas+Neue&family=Caveat:wght@400;700&display=swap');
        
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        
        .print-area {
            display: flex;
            justify-content: center;
            gap: 15px;
            background-color: #ffffff;
            padding: 20px;
            width: 560px; 
            height: 820px;
            margin: 0 auto;
        }

        .photo-strip { flex: 1; display: flex; flex-direction: column; }

        .photo-frame {
            width: 100%;
            height: 165px;
            background-color: #1e293b;
            margin-bottom: 8px;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }

        .photo-canvas { width: 100%; height: 100%; object-fit: cover; }

        .fixed-label {
            position: absolute;
            top: 6px; left: 6px;
            background: #fff; color: #000;
            padding: 1px 6px;
            font-family: 'Bebas Neue', cursive;
            font-size: 0.75rem;
            z-index: 10;
        }

        .caption-container {
            position: absolute;
            bottom: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 10px 5px 5px;
            text-align: center;
            color: white;
        }

        .caption-text { font-size: 0.9rem; font-weight: bold; letter-spacing: -0.02em; }

        .post-card-footer { margin-top: auto; padding: 10px 5px; border-top: 1px solid #f1f5f9; }

        .handwriting-row {
            display: flex; align-items: baseline; gap: 5px;
            font-family: 'Caveat', cursive; color: #334155;
        }

        .label-text { font-size: 0.8rem; font-weight: 700; min-width: 30px; color: #94a3b8; font-family: sans-serif; }
        .input-line { flex: 1; border-bottom: 1px solid #e2e8f0; font-size: 1.1rem; min-height: 1.3rem; }

        #countdown {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 6rem; font-weight: 900; color: white;
            text-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 50;
        }

        .flash { animation: flash-anim 0.3s ease-out; }
        @keyframes flash-anim { 0% { background: white; opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-5xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-slate-800">ENGLISH PHOTOBOOTH</h1>
            <p class="text-slate-500 text-sm">Type 4 memories and click start!</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-start">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <input type="text" id="to-input" oninput="updateFooter()" placeholder="To." class="border p-2 rounded-lg text-sm outline-none focus:border-blue-500">
                    <input type="text" id="from-input" oninput="updateFooter()" placeholder="From." class="border p-2 rounded-lg text-sm outline-none focus:border-blue-500">
                </div>

                <div class="space-y-2 mb-6">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Captions</label>
                    <input type="text" id="msg-0" class="w-full border p-2 rounded-lg text-sm" value="Lovely day with you">
                    <input type="text" id="msg-1" class="w-full border p-2 rounded-lg text-sm" value="Best moment ever">
                    <input type="text" id="msg-2" class="w-full border p-2 rounded-lg text-sm" value="Cheese!">
                    <input type="text" id="msg-3" class="w-full border p-2 rounded-lg text-sm" value="See you again">
                </div>

                <div class="relative rounded-xl overflow-hidden bg-slate-900 aspect-video mb-6">
                    <video id="webcam" autoplay playsinline class="w-full h-full object-cover transform -scale-x-100"></video>
                    <div id="flash-overlay" class="absolute inset-0 pointer-events-none"></div>
                    <div id="countdown" class="hidden"></div>
                </div>

                <button id="start-btn" onclick="startSequence()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-black transition mb-3">
                    START SHOOTING
                </button>
                <div class="flex gap-2">
                    <button onclick="downloadStrip()" class="flex-1 border border-slate-200 py-2 rounded-lg text-sm font-medium hover:bg-slate-50">Save Image</button>
                    <button onclick="window.print()" class="flex-1 border border-slate-200 py-2 rounded-lg text-sm font-medium hover:bg-slate-50">Print</button>
                </div>
            </div>

            <div class="flex justify-center bg-slate-200 p-6 rounded-3xl">
                <div id="capture-area" class="print-area">
                    <div id="strip-left" class="photo-strip"></div>
                    <div id="strip-right" class="photo-strip ml-4"></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="shutter-sound" src="https://assets.mixkit.co/active_storage/sfx/702/702-preview.mp3"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        const video = document.getElementById('webcam');
        const countdownEl = document.getElementById('countdown');
        const flashEl = document.getElementById('flash-overlay');
        const startBtn = document.getElementById('start-btn');
        const shutter = document.getElementById('shutter-sound');

        function initStrips() {
            const containers = [document.getElementById('strip-left'), document.getElementById('strip-right')];
            containers.forEach(container => {
                container.innerHTML = '';
                for(let i=0; i<4; i++) {
                    container.innerHTML += `
                        <div class="photo-frame">
                            <div class="fixed-label">PIC ${i+1}</div>
                            <canvas id="canvas-${container.id}-${i}" class="photo-canvas"></canvas>
                            <div class="caption-container">
                                <div id="text-${container.id}-${i}" class="caption-text">Ready</div>
                            </div>
                        </div>`;
                }
                container.innerHTML += `
                    <div class="post-card-footer">
                        <div class="handwriting-row"><span class="label-text">To.</span><span class="input-line footer-to"></span></div>
                        <div class="handwriting-row"><span class="label-text">From.</span><span class="input-line footer-from"></span></div>
                    </div>`;
            });
        }

        function updateFooter() {
            const to = document.getElementById('to-input').value;
            const from = document.getElementById('from-input').value;
            document.querySelectorAll('.footer-to').forEach(el => el.textContent = to);
            document.querySelectorAll('.footer-from').forEach(el => el.textContent = from);
        }

        async function startSequence() {
            startBtn.disabled = true;
            
            // Set texts first
            for(let i=0; i<4; i++) {
                const val = document.getElementById(`msg-${i}`).value;
                document.getElementById(`text-strip-left-${i}`).textContent = val;
                document.getElementById(`text-strip-right-${i}`).textContent = val;
            }

            for (let i = 0; i < 4; i++) {
                countdownEl.classList.remove('hidden');
                for (let c = 3; c > 0; c--) {
                    countdownEl.textContent = c;
                    await new Promise(r => setTimeout(r, 800));
                }
                countdownEl.classList.add('hidden');
                
                // Flash & Sound
                flashEl.classList.add('flash');
                shutter.currentTime = 0; shutter.play().catch(()=>{});
                
                capture(i);
                
                setTimeout(() => flashEl.classList.remove('flash'), 300);
                await new Promise(r => setTimeout(r, 1000));
            }
            startBtn.disabled = false;
        }

        function capture(index) {
            ['strip-left', 'strip-right'].forEach(id => {
                const canvas = document.getElementById(`canvas-${id}-${index}`);
                const ctx = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0);
            });
        }

        async function downloadStrip() {
            const el = document.getElementById('capture-area');
            const canvas = await html2canvas(el, { scale: 2 });
            const link = document.createElement('a');
            link.download = `photo-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(s => video.srcObject = s)
            .catch(() => alert("Please allow camera access"));

        initStrips();
    </script>
</body>
</html>
